name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Show Schemes（デバッグ用）
        run: xcodebuild -list

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project MathKeyboard.xcodeproj \
            -scheme MathKeyboard \
            -configuration Release \
            -archivePath build/MathKeyboard.xcarchive \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/MathKeyboard.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r MathKeyboard.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MathKeyboard-IPA
          path: build/MathKeyboard.ipa

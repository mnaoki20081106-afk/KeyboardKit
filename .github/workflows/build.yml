name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run xcodegen generate
        run: xcodegen generate

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project MathKeyboard.xcodeproj \
            -scheme HostApp \
            -configuration Release \
            -archivePath build/MathKeyboard.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p build/Payload
          # アーカイブ内のアプリ本体をPayloadディレクトリにコピー
          cp -r build/MathKeyboard.xcarchive/Products/Applications/HostApp.app build/Payload/
          cd build
          # Payloadディレクトリをzip圧縮してipaファイルを作成
          zip -r MathKeyboard.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MathKeyboard-IPA
          path: build/MathKeyboard.ipa
